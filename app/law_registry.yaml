# 法律领域注册表 — 新增法律只需在此添加条目，无需修改其他文件
#
# 字段说明：
#   name:               领域名称（显示在前端标签、用于 LLM 分类）
#   laws:               关联的法律名称列表（与 data/ 目录下的文件名一致，去掉日期后缀）
#                       空列表 [] 表示搜索全部法律（综合领域）
#   weighted_keywords:  带权重的关键词字典（用于基于关键词的置信度分类）
#                       权重规则：核心特征词 0.9，通用关联词 0.7，易误匹配词 0.5
#   rule:               分类提示词中的规则描述（帮助 LLM 判断领域）
#   color:              前端领域标签的 Tailwind CSS 类名
#
# 同义词组（synonym_groups）：
#   列表形式，每组内的词视为等价。匹配任一词即视为命中整组。
#   示例：["起诉", "诉讼", "告他", "打官司"] — 用户说"打官司"也能匹配"起诉"。
#
# 意图关键词（intent_keywords）：
#   analysis:  案情分析意图
#   statute:   诉讼时效意图
#   document:  法律文书意图

synonym_groups:
  - ["起诉", "诉讼", "告他", "打官司", "状告", "官司"]
  - ["赔偿", "赔钱", "补偿", "赔付"]
  - ["仲裁", "劳动仲裁", "申请仲裁"]
  - ["离婚", "离异", "分手"]
  - ["盗窃", "偷窃", "偷东西", "偷", "被盗"]
  - ["诈骗", "骗钱", "欺骗", "骗", "被骗", "上当"]
  - ["工伤", "工伤害", "上班受伤"]
  - ["加班", "超时工作"]
  - ["辞退", "解雇", "开除", "炒鱿鱼"]
  - ["维权", "维护权益"]
  - ["时效", "诉讼时效", "仲裁时效"]

intent_keywords:
  analysis:
    - 分析案情
    - 帮我分析
    - 分析一下
    - 案情分析
    - 起诉
    - 怎么告
    - 能告吗
    - 可以告吗
    - 维权
    - 怎么维权
    - 如何维权
    - 仲裁
    - 申请仲裁
    - 劳动仲裁
    - 赔偿
    - 能赔多少
    - 赔偿多少
    - 官司
    - 打官司
    - 胜诉
    - 赢面
    - 诉讼
    - 提起诉讼
    - 去法院
  statute:
    - 诉讼时效
    - 仲裁时效
    - 时效期间
    - 时效多长
    - 来得及吗
    - 还来得及
    - 过期了吗
    - 过了时效
    - 时效过了
    - 超时效
    - 时效中断
    - 时效中止
    - 时效计算
    - 算一下时效
  document:
    - 生成
    - 帮我写
    - 仲裁申请书
    - 劳动仲裁申请书
    - 仲裁申请
    - 劳动仲裁
    - 申请书
    - 起诉状
    - 律师函
    - 合同审查
    - 写文书
    - 写申请书
    - 写起诉状
    - 写律师函
    - 起草
    - 代书
    - 法律文书
    - 生成文书
    - 申请书模板
    - 起诉状模板

document_classification:
  strong_keywords:
    - 生成
    - 起草
    - 帮我写
    - 写
    - 申请书
    - 起诉状
    - 律师函
    - 法律文书
    - 文书
    - 模板
    - 仲裁申请

