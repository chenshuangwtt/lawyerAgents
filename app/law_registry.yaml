# 法律领域注册表 — 新增法律只需在此添加条目，无需修改其他文件
#
# 字段说明：
#   name:               领域名称（显示在前端标签、用于 LLM 分类）
#   laws:               关联的法律名称列表（与 data/ 目录下的文件名一致，去掉日期后缀）
#                       空列表 [] 表示搜索全部法律（综合领域）
#   weighted_keywords:  带权重的关键词字典（用于基于关键词的置信度分类）
#                       权重规则：核心特征词 0.9，通用关联词 0.7，易误匹配词 0.5
#   rule:               分类提示词中的规则描述（帮助 LLM 判断领域）
#   color:              前端领域标签的 Tailwind CSS 类名

domains:
  - name: 劳动
    laws:
      - 中华人民共和国劳动合同法
    weighted_keywords:
      劳动: 0.9
      工资: 0.8
      社保: 0.7
      工伤: 0.9
      辞退: 0.8
      解雇: 0.8
      加班: 0.7
      休假: 0.6
      劳动合同: 0.9
      试用期: 0.7
      竞业: 0.7
    rule: 劳动合同、工资、社保等 → 劳动
    color: bg-amber-50 text-amber-600 ring-amber-200

  - name: 婚姻
    laws:
      - 中华人民共和国民法典
    weighted_keywords:
      婚姻: 0.9
      离婚: 0.9
      结婚: 0.7
      夫妻: 0.7
      财产分割: 0.9
      抚养: 0.7
      赡养: 0.7
      继承: 0.8
      收养: 0.7
      遗嘱: 0.9
      婚前: 0.7
    rule: 离婚、婚姻、继承、财产分割等 → 婚姻
    color: bg-pink-50 text-pink-600 ring-pink-200

  - name: 民事诉讼
    laws:
      - 中华人民共和国民事诉讼法
      - 中华人民共和国仲裁法
    weighted_keywords:
      诉讼: 0.9
      起诉: 0.9
      上诉: 0.9
      审判: 0.8
      执行: 0.5
      管辖: 0.7
      举证: 0.8
      判决: 0.7
      裁定: 0.7
      仲裁: 0.9
      调解: 0.6
    rule: 起诉、诉讼、仲裁等 → 民事诉讼
    color: bg-violet-50 text-violet-600 ring-violet-200

  - name: 刑事
    laws:
      - 中华人民共和国刑法
      - 中华人民共和国刑法修正案（十二）
      - 中华人民共和国反电信网络诈骗法
    weighted_keywords:
      犯罪: 0.9
      刑罚: 0.9
      判刑: 0.9
      刑事: 0.9
      盗窃: 0.9
      诈骗: 0.9
      抢劫: 0.9
      故意伤害: 0.9
      有期徒刑: 0.9
      缓刑: 0.8
      自首: 0.7
    rule: 犯罪、刑罚、盗窃、诈骗等 → 刑事
    color: bg-red-50 text-red-600 ring-red-200

  - name: 治安
    laws:
      - 中华人民共和国治安管理处罚法
    weighted_keywords:
      治安: 0.9
      处罚: 0.5
      拘留: 0.7
      罚款: 0.5
      扰乱: 0.7
      寻衅滋事: 0.9
      赌博: 0.9
      吸毒: 0.9
    rule: 治安处罚、拘留等 → 治安
    color: bg-orange-50 text-orange-600 ring-orange-200

  - name: 监察
    laws:
      - 中华人民共和国监察法
    weighted_keywords:
      监察: 0.9
      贪污: 0.9
      受贿: 0.9
      渎职: 0.9
      公职人员: 0.8
      政务处分: 0.9
    rule: 监察、贪污、公职人员等 → 监察
    color: bg-slate-50 text-slate-600 ring-slate-200

  - name: 国防
    laws:
      - 中华人民共和国国防法
    weighted_keywords:
      国防: 0.9
      军事: 0.9
      兵役: 0.9
      军人: 0.8
    rule: 国防、军事等 → 国防
    color: bg-emerald-50 text-emerald-600 ring-emerald-200

  - name: 网络与数据
    laws:
      - 中华人民共和国个人信息保护法
    weighted_keywords:
      个人信息: 0.9
      隐私: 0.7
      数据保护: 0.9
      信息安全: 0.7
      人脸识别: 0.9
      大数据: 0.7
      网络安全: 0.8
      数据泄露: 0.9
    rule: 个人信息、隐私保护、数据安全等 → 网络与数据
    color: bg-cyan-50 text-cyan-600 ring-cyan-200

  - name: 商事
    laws:
      - 中华人民共和国反不正当竞争法
    weighted_keywords:
      不正当竞争: 0.9
      商业秘密: 0.9
      垄断: 0.9
      虚假宣传: 0.8
      商标: 0.8
      知识产权: 0.7
      商业贿赂: 0.9
      仿冒: 0.8
    rule: 不正当竞争、商业秘密、垄断等 → 商事
    color: bg-indigo-50 text-indigo-600 ring-indigo-200

  - name: 税务
    laws:
      - 中华人民共和国增值税法
    weighted_keywords:
      增值税: 0.9
      税收: 0.8
      纳税: 0.8
      税务: 0.9
      发票: 0.7
      税率: 0.8
      税款: 0.8
      逃税: 0.9
      偷税: 0.9
    rule: 增值税、税收、纳税等 → 税务
    color: bg-lime-50 text-lime-600 ring-lime-200

  - name: 未成年人
    laws:
      - 中华人民共和国未成年人保护法
    weighted_keywords:
      未成年人: 0.9
      未成年: 0.9
      儿童: 0.7
      青少年: 0.7
      校园欺凌: 0.9
      监护: 0.7
      留守儿童: 0.8
      网络沉迷: 0.8
    rule: 未成年人保护、校园欺凌、监护等 → 未成年人
    color: bg-sky-50 text-sky-600 ring-sky-200

  - name: 行政
    laws:
      - 中华人民共和国行政复议法
    weighted_keywords:
      行政复议: 0.9
      行政处罚: 0.9
      行政诉讼: 0.9
      行政机关: 0.7
      行政许可: 0.8
      强制执行: 0.6
      政府信息公开: 0.8
      国家赔偿: 0.8
    rule: 行政复议、行政处罚、行政诉讼等 → 行政
    color: bg-teal-50 text-teal-600 ring-teal-200

  - name: 食药安全
    laws:
      - 中华人民共和国食品安全法
    weighted_keywords:
      食品安全: 0.9
      食品: 0.7
      药品: 0.7
      食品添加剂: 0.9
      食品卫生: 0.8
      假药: 0.9
      劣药: 0.9
      保健食品: 0.8
    rule: 食品安全、药品安全等 → 食药安全
    color: bg-rose-50 text-rose-600 ring-rose-200

  - name: 综合
    laws: []
    keywords: []
    rule: 涉及多个领域或无法确定 → 综合
    color: bg-gray-50 text-gray-500 ring-gray-200
